<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Liga San Miguel</title>
  <style>

select {
  background: #0a0f1c;
  color: #ffffff;
  border: 1px solid rgba(255,255,255,0.2);
}

select option {
  background: #0a0f1c;
  color: #ffffff;
}

.game.disabled {
  opacity: 0.45;
  filter: grayscale(0.15);
}

.game.disabled input {
  pointer-events: none;
}

.game-note {
  margin-top: 10px;
  font-size: 0.88rem;
  color: #94a3b8;
}

.game-note.active {
  color: #f8fafc;
}

.round-tabs {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.round-tab {
  padding: 10px 16px;
  border-radius: 999px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  color: #cbd5e1;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s ease;
}

.round-tab:hover {
  background: rgba(255,255,255,0.1);
}

.round-tab.active {
  background: #d6b06a;
  color: #081120;
  border-color: #d6b06a;
}

    body {
      font-family: Inter, system-ui, sans-serif;
      background: #0a0f1c;
      margin: 0;
      padding: 24px;
      color: #f8fafc;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0;
      font-size: 2rem;
    }

    .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 10px 28px rgba(0,0,0,0.18);
    }

    .head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .match-title {
      font-size: 1.15rem;
      font-weight: 800;
      color: #ffffff;
    }

    .meta {
      color: #94a3b8;
      font-size: 0.92rem;
      margin-top: 4px;
    }

    .game {
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 16px;
      margin-top: 14px;
      background: rgba(255,255,255,0.03);
    }

    .game-title {
      font-size: 1rem;
      font-weight: 800;
      color: #e2e8f0;
      margin-bottom: 12px;
    }

    .team-block {
      display: grid;
      gap: 2px;
      margin-bottom: 10px;
    }

    .team-name {
      font-weight: 800;
      color: #ffffff;
    }

    .players {
      color: #94a3b8;
      font-size: 0.92rem;
    }

    .section-label {
      margin-top: 14px;
      margin-bottom: 8px;
      font-size: 0.9rem;
      font-weight: 800;
      color: #cbd5e1;
    }

    .sets-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(180px, 1fr));
      gap: 12px;
      margin-top: 10px;
    }

    .set-box {
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 12px;
      background: rgba(255,255,255,0.04);
    }

    .set-box label {
      display: block;
      font-size: 0.86rem;
      color: #cbd5e1;
      margin-bottom: 8px;
      font-weight: 700;
    }

    .score-pair {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    input {
      width: 72px;
      padding: 10px;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 10px;
      font-size: 1rem;
      text-align: center;
      background: rgba(255,255,255,0.06);
      color: #ffffff;
      outline: none;
    }

    input::placeholder {
      color: #94a3b8;
    }

    input:focus {
      border-color: #d6b06a;
      box-shadow: 0 0 0 3px rgba(214,176,106,0.12);
    }

    .result-box {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 12px;
      font-weight: 800;
      font-size: 0.95rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      color: #cbd5e1;
    }

    .result-box.win-home {
      background: rgba(34,197,94,0.12);
      border-color: rgba(34,197,94,0.28);
      color: #86efac;
    }

    .result-box.win-away {
      background: rgba(59,130,246,0.12);
      border-color: rgba(59,130,246,0.28);
      color: #93c5fd;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    button {
      background: #d6b06a;
      color: #081120;
      border: 0;
      border-radius: 12px;
      padding: 11px 18px;
      cursor: pointer;
      font-weight: 800;
      font-size: 0.95rem;
    }

    button:hover {
      background: #e3bf7b;
    }

    .ok {
      color: #86efac;
      font-weight: 800;
    }

    .empty {
      color: #94a3b8;
      padding: 18px 0;
    }

    @media (max-width: 900px) {
      .sets-grid {
        grid-template-columns: 1fr;
      }

      input {
        width: 100%;
      }

      .score-pair {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>Panel Admin</h1>
<div id="roundTabs" class="round-tabs"></div>
  </div>

  <div id="matches"></div>

  <script>
    const API = "https://liga-backend-f08y.onrender.com";

    function groupMatches(data) {
      const map = new Map();

      data.forEach(item => {
        if (!map.has(item.match_id)) {
          map.set(item.match_id, {
            match_id: item.match_id,
            round_number: item.round_number,
            home_team_name: item.home_team_name,
            away_team_name: item.away_team_name,
            venue_club: item.venue_club,
            scheduled_at: item.scheduled_at,
            games: []
          });
        }
        map.get(item.match_id).games.push(item);
      });

      return Array.from(map.values());
    }

    function setValue(value) {
      return value ?? "";
    }

    function parseNullableInt(value) {
      return value === "" ? null : parseInt(value, 10);
    }

    function calculateSets(matchId, gameNumber) {
      const sets = [
        {
          home_games: parseNullableInt(document.getElementById(`s1h_${matchId}_${gameNumber}`).value),
          away_games: parseNullableInt(document.getElementById(`s1a_${matchId}_${gameNumber}`).value),
        },
        {
          home_games: parseNullableInt(document.getElementById(`s2h_${matchId}_${gameNumber}`).value),
          away_games: parseNullableInt(document.getElementById(`s2a_${matchId}_${gameNumber}`).value),
        },
        {
          home_games: parseNullableInt(document.getElementById(`s3h_${matchId}_${gameNumber}`).value),
          away_games: parseNullableInt(document.getElementById(`s3a_${matchId}_${gameNumber}`).value),
        }
      ];

      let homeSets = 0;
      let awaySets = 0;

      sets.forEach(set => {
        if (set.home_games != null && set.away_games != null) {
          if (set.home_games > set.away_games) homeSets++;
          else if (set.away_games > set.home_games) awaySets++;
        }
      });

      return { homeSets, awaySets, sets };
    }

function getGameWinner(matchId, gameNumber) {
  const { homeSets, awaySets } = calculateSets(matchId, gameNumber);

  if (homeSets > awaySets) return "home";
  if (awaySets > homeSets) return "away";
  return null;
}

function evaluateTiebreakState(matchId) {
  const winner1 = getGameWinner(matchId, 1);
  const winner2 = getGameWinner(matchId, 2);

  const game3Card = document.getElementById(`game_${matchId}_3`);
  if (!game3Card) return;

  const inputs = [
    `s1h_${matchId}_3`, `s1a_${matchId}_3`,
    `s2h_${matchId}_3`, `s2a_${matchId}_3`,
    `s3h_${matchId}_3`, `s3a_${matchId}_3`
  ].map(id => document.getElementById(id));

  const note = document.getElementById(`game_note_${matchId}_3`);

  const enableTiebreak = winner1 && winner2 && winner1 !== winner2;

  if (enableTiebreak) {
    game3Card.classList.remove("disabled");
    inputs.forEach(input => {
      if (input) input.disabled = false;
    });
    if (note) {
      note.textContent = "Mixto habilitado: los partidos 1 y 2 quedaron 1-1.";
      note.classList.add("active");
    }
  } else {
    game3Card.classList.add("disabled");
    inputs.forEach(input => {
      if (input) {
        input.disabled = true;
        input.value = "";
      }
    });

    if (note) {
      note.textContent = "El mixto solo se juega si los partidos 1 y 2 quedan 1-1.";
      note.classList.remove("active");
    }

    const resultEl = document.getElementById(`result_${matchId}_3`);
    if (resultEl) {
      resultEl.className = "result-box";
      resultEl.textContent = "Mixto deshabilitado por ahora.";
    }
  }
}

    function updateResultBox(matchId, gameNumber, homeTeam, awayTeam) {
      const resultEl = document.getElementById(`result_${matchId}_${gameNumber}`);
      const { homeSets, awaySets } = calculateSets(matchId, gameNumber);

      resultEl.className = "result-box";

      if (homeSets === 0 && awaySets === 0) {
        resultEl.textContent = "Ingresa los games de cada set para ver el resultado automático.";
        return;
      }

      if (homeSets > awaySets) {
        resultEl.classList.add("win-home");
        resultEl.textContent = `Resultado automático: ${homeTeam} gana ${homeSets}-${awaySets}`;
      } else if (awaySets > homeSets) {
        resultEl.classList.add("win-away");
        resultEl.textContent = `Resultado automático: ${awayTeam} gana ${awaySets}-${homeSets}`;
      } else {
        resultEl.textContent = `Resultado parcial: ${homeSets}-${awaySets}`;
      }
    }


function bindResultInputs(matchId, gameNumber, homeTeam, awayTeam) {
  const ids = [
    `s1h_${matchId}_${gameNumber}`,
    `s1a_${matchId}_${gameNumber}`,
    `s2h_${matchId}_${gameNumber}`,
    `s2a_${matchId}_${gameNumber}`,
    `s3h_${matchId}_${gameNumber}`,
    `s3a_${matchId}_${gameNumber}`
  ];

  ids.forEach(id => {
    const el = document.getElementById(id);
    if (el) {
      el.addEventListener("input", () => {
        updateResultBox(matchId, gameNumber, homeTeam, awayTeam);
        evaluateTiebreakState(matchId);
      });
    }
  });

  updateResultBox(matchId, gameNumber, homeTeam, awayTeam);
}

    async function loadAdminMatches() {
      const res = await fetch(API + "/admin/matches");
      const data = await res.json();
      const grouped = groupMatches(data);

      renderRoundTabs(grouped);
      const selectedRound = currentRound;

      const container = document.getElementById("matches");
      container.innerHTML = "";

      const filtered = selectedRound === "all"
        ? grouped
        : grouped.filter(m => String(m.round_number) === selectedRound);

      if (!filtered.length) {
        container.innerHTML = '<div class="empty">No hay matches para esta ronda.</div>';
        return;
      }

      filtered.forEach(match => {
        const gamesHtml = match.games.map(game => `
          <div class="game" id="game_${match.match_id}_${game.game_number}">
            <div class="game-title">Partido ${game.game_number}</div>

            <div class="team-block">
              <div class="team-name">${match.home_team_name}</div>
              <div class="players">${game.home_player_1 || "Por definir"} / ${game.home_player_2 || "Por definir"}</div>
            </div>

            <div class="team-block">
              <div class="team-name">${match.away_team_name}</div>
              <div class="players">${game.away_player_1 || "Por definir"} / ${game.away_player_2 || "Por definir"}</div>
            </div>

            <div class="section-label">Resultado por set</div>
            <div class="sets-grid">
              <div class="set-box">
                <label>Set 1</label>
                <div class="score-pair">
                  <input type="number" min="0" id="s1h_${match.match_id}_${game.game_number}" value="${setValue(game.set1_home_games)}" placeholder="Local" />
                  <span>-</span>
                  <input type="number" min="0" id="s1a_${match.match_id}_${game.game_number}" value="${setValue(game.set1_away_games)}" placeholder="Visita" />
                </div>
              </div>

              <div class="set-box">
                <label>Set 2</label>
                <div class="score-pair">
                  <input type="number" min="0" id="s2h_${match.match_id}_${game.game_number}" value="${setValue(game.set2_home_games)}" placeholder="Local" />
                  <span>-</span>
                  <input type="number" min="0" id="s2a_${match.match_id}_${game.game_number}" value="${setValue(game.set2_away_games)}" placeholder="Visita" />
                </div>
              </div>

              <div class="set-box">
                <label>Set 3</label>
                <div class="score-pair">
                  <input type="number" min="0" id="s3h_${match.match_id}_${game.game_number}" value="${setValue(game.set3_home_games)}" placeholder="Local" />
                  <span>-</span>
                  <input type="number" min="0" id="s3a_${match.match_id}_${game.game_number}" value="${setValue(game.set3_away_games)}" placeholder="Visita" />
                </div>
              </div>
            </div>

            <div id="result_${match.match_id}_${game.game_number}" class="result-box">
              Ingresa los games de cada set para ver el resultado automático.
            </div>

            <div id="game_note_${match.match_id}_${game.game_number}" class="game-note">
              ${game.game_number === 3 ? "El mixto solo se juega si los partidos 1 y 2 quedan 1-1." : ""}
            </div>
          </div>
        `).join("");

        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <div class="head">
            <div>
              <div class="match-title">Ronda ${match.round_number} · ${match.home_team_name} vs ${match.away_team_name}</div>
              <div class="meta">📍 ${match.venue_club} · 🕒 ${new Date(match.scheduled_at).toLocaleString("es-CL")}</div>
            </div>
          </div>
          ${gamesHtml}
          <div class="actions">
            <button onclick="saveMatch(${match.match_id}, ${match.games.length})">Guardar match</button>
            <span id="ok_${match.match_id}" class="ok"></span>
          </div>
        `;

        container.appendChild(card);

        match.games.forEach(game => {
          bindResultInputs(
            match.match_id,
            game.game_number,
            match.home_team_name,
            match.away_team_name
          );
        });
evaluateTiebreakState(match.match_id);
      });
    }

    async function saveMatch(matchId, gameCount) {
      const games = [];

      for (let i = 1; i <= gameCount; i++) {
        const calculated = calculateSets(matchId, i);

        games.push({
          game_number: i,
          home_sets: calculated.homeSets,
          away_sets: calculated.awaySets,
          sets: calculated.sets
        });
      }

      await fetch(API + `/admin/match/${matchId}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ games })
      });

      document.getElementById(`ok_${matchId}`).textContent = "Guardado";
      setTimeout(() => {
        document.getElementById(`ok_${matchId}`).textContent = "";
      }, 2000);
    }

let currentRound = "all";

function renderRoundTabs(grouped) {
  const container = document.getElementById("roundTabs");

  const rounds = [...new Set(grouped.map(m => m.round_number))]
    .filter(r => r !== null && r !== undefined)
    .sort((a, b) => a - b);

  container.innerHTML = "";

  // botón "todas"
  const allTab = document.createElement("div");
  allTab.className = "round-tab" + (currentRound === "all" ? " active" : "");
  allTab.textContent = "Todas";
  allTab.onclick = () => {
    currentRound = "all";
    loadAdminMatches();
  };
  container.appendChild(allTab);

  // tabs por ronda
  rounds.forEach(r => {
    const tab = document.createElement("div");
    tab.className = "round-tab" + (currentRound == r ? " active" : "");
    tab.textContent = `Ronda ${r}`;
    tab.onclick = () => {
      currentRound = String(r);
      loadAdminMatches();
    };
    container.appendChild(tab);
  });
}

    loadAdminMatches().catch(console.error);
  </script>
</body>
</html>
