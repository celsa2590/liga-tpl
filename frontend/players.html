<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jugadores - TPL Chile</title>

<style>
:root {
  --bg: #05080f;
  --card: rgba(255,255,255,0.04);
  --line: rgba(255,255,255,0.08);
  --gold: #d6b06a;
  --text: #fff;
  --muted: rgba(255,255,255,0.65);
}

body {
  margin: 0;
  font-family: Inter, system-ui;
  background: radial-gradient(circle at top, #0f1b2d, #05080f);
  color: var(--text);
}

.container {
  width: min(1100px, calc(100% - 24px));
  margin: auto;
}

/* HEADER */

.site-header {
  position: sticky;
  top: 0;
  backdrop-filter: blur(10px);
  background: rgba(5,8,15,0.9);
  border-bottom: 1px solid var(--line);
}

.site-header-inner {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px;
}

.brand {
  display: flex;
  gap: 10px;
  align-items: center;
}

.brand-logo {
  width: 44px;
}

.nav-link {
  padding: 8px 12px;
  border-radius: 20px;
  font-weight: 700;
}

.nav-link:hover {
  background: rgba(214,176,106,0.15);
}

/* HERO */

.hero {
  margin-top: 20px;
  background: linear-gradient(135deg,#081120,#13284a);
  padding: 20px;
  border-radius: 20px;
}

.hero h1 {
  margin: 0;
  font-size: 1.8rem;
}

.hero p {
  color: var(--muted);
}

/* CARDS */

.players-grid {
  margin-top: 20px;
  display: grid;
  gap: 14px;
}

.player-card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 14px;
}

.player-top {
  display: flex;
  gap: 12px;
  align-items: center;
}

.player-photo {
  width: 56px;
  height: 56px;
  border-radius: 12px;
  object-fit: cover;
}

.player-name {
  font-weight: 800;
}

.player-meta {
  font-size: 0.85rem;
  color: var(--muted);
}

.player-points {
  margin-left: auto;
  font-weight: 900;
  color: var(--gold);
}

/* STATS */

.player-stats {
  display: flex;
  justify-content: space-between;
  margin-top: 10px;
  font-size: 0.85rem;
}

/* EXPAND */

.player-detail {
  margin-top: 12px;
  display: none;
}

.player-card.open .player-detail {
  display: block;
}

/* MOBILE FIRST */
</style>
</head>

<body>

<header class="site-header">
  <div class="site-header-inner container">
    <div class="brand">
      <img src="/assets/logos/tpl_logo_trans.png" class="brand-logo">
      <strong>TPL Chile</strong>
    </div>

    <nav>
      <a href="/" class="nav-link">Inicio</a>
      <a href="/teams.html" class="nav-link">Equipos</a>
      <a href="/players.html" class="nav-link">Jugadores</a>
    </nav>
  </div>
</header>

<div class="container">

  <section class="hero">
    <h1>Jugadoras</h1>
    <p>Ranking, rendimiento y estadísticas</p>
  </section>

  <section id="players" class="players-grid">
    Cargando...
  </section>

</div>

<script>
const API = "https://liga-backend-f08y.onrender.com";

function playerCard(p) {
  return `
    <div class="player-card" onclick="toggleDetail(this)">
      <div class="player-top">
        <img src="${p.photo_url || '/assets/players/default.png'}" class="player-photo">
        
        <div>
          <div class="player-name">${p.first_name} ${p.last_name}</div>
          <div class="player-meta">${p.team_name} · ${p.position || 'Por definir'}</div>
        </div>

        <div class="player-points">${p.ranking_points} pts</div>
      </div>

      <div class="player-stats">
        <div>PJ ${p.matches_played || 0}</div>
        <div>PG ${p.wins || 0}</div>
        <div>PP ${p.losses || 0}</div>
      </div>

      <div class="player-detail">
        <hr>
        <div>Sets ganados: ${p.sets_won || 0}</div>
        <div>Sets perdidos: ${p.sets_lost || 0}</div>
      </div>
    </div>
  `;
}

function toggleDetail(el) {
  el.classList.toggle("open");
}

async function loadPlayers() {
  const container = document.getElementById("players");

  try {
    const res = await fetch(API + "/players/stats");
    const data = await res.json();

    container.innerHTML = data.map(playerCard).join("");

  } catch (e) {
    container.innerHTML = "Error cargando jugadores";
  }
}

loadPlayers();
</script>

</body>
</html>
