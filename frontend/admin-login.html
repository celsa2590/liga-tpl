<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Admin - Team Padel League</title>
  <style>
    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      background: #0a0f1c;
      color: #f8fafc;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }

    .card {
      width: min(420px, calc(100% - 32px));
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 14px 34px rgba(0,0,0,0.24);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.8rem;
    }

    .sub {
      color: #94a3b8;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
      color: #e2e8f0;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 12px 14px;
      margin-bottom: 16px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      color: #fff;
      outline: none;
    }

    input:focus {
      border-color: #d6b06a;
      box-shadow: 0 0 0 3px rgba(214,176,106,0.12);
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 12px;
      padding: 12px 16px;
      background: #d6b06a;
      color: #081120;
      font-weight: 800;
      cursor: pointer;
      font-size: 1rem;
    }

    button:hover {
      background: #e3bf7b;
    }

    .msg {
      margin-top: 14px;
      font-weight: 700;
      min-height: 24px;
    }

    .error {
      color: #fca5a5;
    }

    .ok {
      color: #86efac;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Admin</h1>
    <div class="sub">Ingresa con tu usuario y contraseña para administrar la liga.</div>

    <form id="loginForm">
      <label for="username">Usuario</label>
      <input id="username" type="text" required />

      <label for="password">Contraseña</label>
      <input id="password" type="password" required />

      <button type="submit">Ingresar</button>
      <div id="msg" class="msg"></div>
    </form>
  </div>

  <script>
    const API = "https://liga-backend-f08y.onrender.com";

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const msg = document.getElementById("msg");
      msg.className = "msg";
      msg.textContent = "Ingresando...";

      const payload = {
        username: document.getElementById("username").value.trim(),
        password: document.getElementById("password").value
      };

      try {
        const res = await fetch(API + "/admin/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.detail || "No se pudo iniciar sesión");
        }

        localStorage.setItem("admin_token", data.access_token);
        localStorage.setItem("admin_username", data.username);

        msg.className = "msg ok";
        msg.textContent = "Login correcto. Redirigiendo...";

        setTimeout(() => {
          window.location.href = "/admin.html";
        }, 700);

      } catch (error) {
        msg.className = "msg error";
        msg.textContent = error.message;
      }
    });
  </script>
</body>
</html>
