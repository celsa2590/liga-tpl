<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Selectivos | TPL</title>
  <link rel="stylesheet" href="assets/styles.css" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b0f;
      color: #fff;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 20px 60px;
    }

    .hero {
      text-align: center;
      margin-bottom: 32px;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: 2rem;
    }

    .hero p {
      margin: 0;
      color: #cfcfcf;
      font-size: 1rem;
    }

    .clubs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .club-card {
      background: #15151c;
      border: 1px solid #2a2a34;
      border-radius: 18px;
      padding: 24px 20px;
      text-align: center;
      text-decoration: none;
      color: #fff;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .club-card:hover {
      transform: translateY(-4px);
      border-color: #d4af37;
      box-shadow: 0 10px 24px rgba(0,0,0,0.35);
    }

    .club-logo {
      width: 72px;
      height: 72px;
      object-fit: contain;
      margin-bottom: 14px;
    }

    .club-card h2 {
      margin: 0 0 8px;
      font-size: 1.15rem;
    }

    .club-card span {
      font-size: 0.95rem;
      color: #c8c8c8;
    }

    .back-link {
      display: inline-block;
      margin-top: 28px;
      color: #d4af37;
      text-decoration: none;
      font-weight: bold;
    }

    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <h1>Selectivos</h1>
      <p>Escoge el club para revisar la información correspondiente a sus selectivos.</p>
    </section>

    <section class="clubs-grid">
      <a class="club-card" href="selectivosactive.html">
        <img src="assets/logos/espacio-active.png" alt="Espacio Active" class="club-logo">
        <h2>Espacio Active</h2>
        <span>Ver selectivos del club</span>
      </a>

      <a class="club-card" href="selectivosarena.html">
        <img src="assets/logos/2.png" alt="Arena" class="club-logo">
        <h2>Arena</h2>
        <span>Ver selectivos del club</span>
      </a>

      <a class="club-card" href="selectivospropadel.html">
        <img src="assets/logos/Propadel_logo_transp.png" alt="Propadel" class="club-logo">
        <h2>Propadel</h2>
        <span>Ver selectivos del club</span>
      </a>

      <a class="club-card" href="selectivosrevueltas.html">
        <img src="assets/logos/Revueltas.PNG" alt="Revueltas" class="club-logo">
        <h2>Revueltas</h2>
        <span>Ver selectivos del club</span>
      </a>
    </section>

    <a class="back-link" href="index.html">← Volver al inicio</a>
  </main>
</body>
</html>
